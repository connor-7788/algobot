services:
  - type: web
    name: algotrader
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python launch.py
    envVars:
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_PAPER
        value: true
      - key: KALSHI_API_KEY
        sync: false
      - key: KALSHI_ENV
        value: demo
      - key: KALSHI_PRIVATE_KEY_CONTENT
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: PORT
        value: 10000
